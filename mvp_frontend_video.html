<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniCPM-o Realtime Video Duplex — MVP</title>
<style>
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --accent: #6c8cff; --green: #4caf50; --red: #ef5350; --text: #e0e0e0; --dim: #888; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; }
  h1 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--accent); }

  .controls { display: flex; gap: 0.8rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; justify-content: center; }
  input[type=text] { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 0.45rem 0.7rem; border-radius: 6px; width: 260px; font-size: 0.85rem; }
  select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 0.45rem 0.5rem; border-radius: 6px; font-size: 0.85rem; }
  button { padding: 0.45rem 1rem; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
  #btnStart { background: var(--green); color: #fff; }
  #btnStop { background: var(--red); color: #fff; }
  #btnInterrupt { background: #ff9800; color: #fff; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar { display: flex; gap: 1.2rem; margin-bottom: 1rem; font-size: 0.8rem; flex-wrap: wrap; justify-content: center; }
  .status-item { display: flex; align-items: center; gap: 0.3rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.listening { background: var(--green); animation: pulse 1.5s infinite; }
  .dot.speaking { background: var(--accent); animation: pulse 0.6s infinite; }
  .dot.connecting { background: #ff9800; animation: pulse 1s infinite; }
  .dot.idle { background: var(--dim); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .main-layout { display: flex; gap: 1rem; width: 100%; max-width: 900px; margin-bottom: 1rem; }
  .video-col { flex: 0 0 320px; }
  .text-col { flex: 1; min-width: 0; }

  video { width: 320px; height: 240px; background: #000; border-radius: 8px; transform: scaleX(-1); }
  canvas { display: none; }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; width: 100%; margin-bottom: 0.8rem; }
  .panel-header { padding: 0.5rem 0.8rem; font-size: 0.75rem; color: var(--dim); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em; }
  .panel-body { padding: 0.8rem; max-height: 240px; overflow-y: auto; font-size: 0.9rem; line-height: 1.6; }
  #transcript { white-space: pre-wrap; word-break: break-word; }
  #logArea { font-family: 'Menlo', 'Consolas', monospace; font-size: 0.72rem; color: var(--dim); white-space: pre-wrap; word-break: break-all; }
  .full-width { max-width: 900px; width: 100%; }
</style>
</head>
<body>

<h1>MiniCPM-o Realtime Duplex</h1>

<div class="controls">
  <input type="text" id="hostInput" placeholder="wss://host:port" value="wss://39.107.237.62:7036">
  <select id="modeSelect">
    <option value="video">Video Duplex</option>
    <option value="audio">Audio Only</option>
  </select>
  <button id="btnStart">Start</button>
  <button id="btnStop" disabled>Stop</button>
  <button id="btnInterrupt" disabled>Interrupt</button>
</div>

<div class="status-bar">
  <div class="status-item"><div class="dot idle" id="statusDot"></div><span id="statusText">Idle</span></div>
  <div class="status-item">KV: <span id="kvDisplay">0</span>/8192</div>
  <div class="status-item">Chunks: <span id="chunkCount">0</span></div>
  <div class="status-item">Queue: <span id="queueDisplay">—</span></div>
  <div class="status-item">Mode: <span id="modeDisplay">—</span></div>
</div>

<div class="main-layout">
  <div class="video-col">
    <video id="preview" autoplay muted playsinline></video>
    <canvas id="captureCanvas" width="640" height="480"></canvas>
  </div>
  <div class="text-col">
    <div class="panel">
      <div class="panel-header">Transcript</div>
      <div class="panel-body" id="transcript"></div>
    </div>
  </div>
</div>

<div class="panel full-width">
  <div class="panel-header">Event Log</div>
  <div class="panel-body" id="logArea"></div>
</div>

<script>
const INPUT_RATE = 16000;
const OUTPUT_RATE = 24000;
const CHUNK_SEC = 1;
const JPEG_QUALITY = 0.7;

const $ = id => document.getElementById(id);
const btnStart = $('btnStart'), btnStop = $('btnStop'), btnInterrupt = $('btnInterrupt');
const modeSelect = $('modeSelect');
const statusDot = $('statusDot'), statusText = $('statusText');
const kvDisplay = $('kvDisplay'), chunkCountEl = $('chunkCount');
const queueDisplay = $('queueDisplay'), modeDisplay = $('modeDisplay');
const transcript = $('transcript'), logArea = $('logArea');
const preview = $('preview');
const captureCanvas = $('captureCanvas'), captureCtx = captureCanvas.getContext('2d');

let ws = null;
let mediaStream = null;
let audioContext = null;
let playbackCtx = null;
let scriptProcessor = null;
let sendInterval = null;
let audioBuffer = [];
let chunksSent = 0;
let sessionActive = false;
let sessionCreated = false;
let currentMode = 'video';

function log(msg) {
  const ts = new Date().toLocaleTimeString();
  logArea.textContent += `[${ts}] ${msg}\n`;
  logArea.scrollTop = logArea.scrollHeight;
}

function setStatus(state, text) {
  statusDot.className = 'dot ' + state;
  statusText.textContent = text;
}

// ── Audio playback (24kHz float32 PCM) ──────────────────────────

let nextPlayTime = 0;

function playAudioChunk(b64) {
  if (!b64) return;
  const raw = atob(b64);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  const float32 = new Float32Array(bytes.buffer);

  if (!playbackCtx) playbackCtx = new AudioContext({ sampleRate: OUTPUT_RATE });

  const buf = playbackCtx.createBuffer(1, float32.length, OUTPUT_RATE);
  buf.getChannelData(0).set(float32);

  const src = playbackCtx.createBufferSource();
  src.buffer = buf;
  src.connect(playbackCtx.destination);

  const now = playbackCtx.currentTime;
  if (nextPlayTime < now) nextPlayTime = now;
  src.start(nextPlayTime);
  nextPlayTime += buf.duration;
}

function stopPlayback() { nextPlayTime = 0; }

// ── Microphone capture (16kHz float32) ──────────────────────────

async function startMedia() {
  const constraints = { audio: { sampleRate: INPUT_RATE, channelCount: 1, echoCancellation: true } };
  if (currentMode === 'video') {
    constraints.video = { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' };
  }

  mediaStream = await navigator.mediaDevices.getUserMedia(constraints);

  if (currentMode === 'video') {
    preview.srcObject = mediaStream;
    preview.style.display = '';
  } else {
    preview.style.display = 'none';
  }

  audioContext = new AudioContext({ sampleRate: INPUT_RATE });
  const source = audioContext.createMediaStreamSource(mediaStream);
  const bufSize = 4096;
  scriptProcessor = audioContext.createScriptProcessor(bufSize, 1, 1);
  scriptProcessor.onaudioprocess = (e) => {
    audioBuffer.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };
  source.connect(scriptProcessor);
  scriptProcessor.connect(audioContext.destination);
  log(`Media started: audio=${audioContext.sampleRate}Hz` + (currentMode === 'video' ? ' + video' : ''));
}

function collectAudioChunk() {
  const merged = new Float32Array(INPUT_RATE);
  let offset = 0;
  const remaining = [];
  for (const buf of audioBuffer) {
    const needed = INPUT_RATE - offset;
    if (needed <= 0) { remaining.push(buf); continue; }
    if (buf.length <= needed) {
      merged.set(buf, offset);
      offset += buf.length;
    } else {
      merged.set(buf.subarray(0, needed), offset);
      remaining.push(buf.subarray(needed));
      offset += needed;
    }
  }
  audioBuffer = remaining;
  return float32ToBase64(merged);
}

function float32ToBase64(f32) {
  const bytes = new Uint8Array(f32.buffer);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// ── Video frame capture ─────────────────────────────────────────

function captureFrame() {
  if (!mediaStream) return null;
  const videoTrack = mediaStream.getVideoTracks()[0];
  if (!videoTrack) return null;

  captureCtx.drawImage(preview, 0, 0, captureCanvas.width, captureCanvas.height);
  const dataUrl = captureCanvas.toDataURL('image/jpeg', JPEG_QUALITY);
  // Strip "data:image/jpeg;base64," prefix
  return dataUrl.split(',')[1];
}

// ── WebSocket lifecycle ─────────────────────────────────────────

async function start() {
  currentMode = modeSelect.value;
  const host = $('hostInput').value.replace(/\/$/, '');
  const url = `${host}/v1/realtime?mode=${currentMode}`;

  btnStart.disabled = true;
  btnStop.disabled = false;
  btnInterrupt.disabled = true;
  modeSelect.disabled = true;
  modeDisplay.textContent = currentMode === 'video' ? 'Video' : 'Audio';
  setStatus('connecting', 'Connecting...');
  chunksSent = 0;
  sessionCreated = false;
  transcript.textContent = '';
  log(`Mode: ${currentMode}, connecting to ${url}`);

  try {
    await startMedia();
  } catch (e) {
    log(`Media error: ${e.message}`);
    setStatus('idle', 'Media Error');
    btnStart.disabled = false;
    btnStop.disabled = true;
    modeSelect.disabled = false;
    return;
  }

  ws = new WebSocket(url);

  ws.onopen = () => {
    log('WebSocket connected');
    sessionActive = true;
    setTimeout(() => {
      if (sessionActive && !sessionCreated) sendSessionUpdate();
    }, 2000);
  };

  ws.onmessage = (event) => handleServerEvent(JSON.parse(event.data));

  ws.onerror = () => {
    log('WebSocket error');
    setStatus('idle', 'Error');
  };

  ws.onclose = (e) => {
    log(`WebSocket closed: code=${e.code} reason=${e.reason}`);
    cleanup();
  };
}

function handleServerEvent(msg) {
  const type = msg.type;
  switch (type) {
    case 'session.queued':
      setStatus('connecting', `Queued #${msg.position}`);
      queueDisplay.textContent = `#${msg.position} (~${msg.estimated_wait_s || '?'}s)`;
      log(`← session.queued  position=${msg.position} eta=${msg.estimated_wait_s}s queue_length=${msg.queue_length ?? ''} ticket=${msg.ticket_id ?? ''}`);
      break;
    case 'session.queue_update':
      queueDisplay.textContent = `#${msg.position} (~${msg.estimated_wait_s || '?'}s)`;
      log(`← session.queue_update  position=${msg.position} eta=${msg.estimated_wait_s}s queue_length=${msg.queue_length ?? ''}`);
      break;
    case 'session.queue_done':
      queueDisplay.textContent = 'Done';
      log('← session.queue_done');
      sendSessionUpdate();
      break;
    case 'session.created':
      sessionCreated = true;
      setStatus('listening', 'Listening');
      btnInterrupt.disabled = false;
      log(`← session.created  session_id="${msg.session_id}" prompt_length=${msg.prompt_length}`);
      startSending();
      break;
    case 'response.output_audio.delta': {
      setStatus('speaking', 'Speaking');
      const text = msg.text || '';
      if (text) transcript.textContent += text;
      transcript.scrollTop = transcript.scrollHeight;
      kvDisplay.textContent = msg.kv_cache_length || '0';
      if (msg.audio) playAudioChunk(msg.audio);
      const audioSamples = msg.audio ? Math.floor(byteSize(msg.audio) / 4) : 0;
      let extra = '';
      if (msg.cost_all_ms != null) extra += ` cost_all=${msg.cost_all_ms}ms`;
      if (msg.cost_llm_ms != null) extra += ` llm=${msg.cost_llm_ms}ms`;
      if (msg.cost_tts_ms != null) extra += ` tts=${msg.cost_tts_ms}ms`;
      if (msg.wall_clock_ms != null) extra += ` wall=${msg.wall_clock_ms}ms`;
      if (msg.n_tokens != null) extra += ` n_tok=${msg.n_tokens}`;
      if (msg.source) extra += ` src=${msg.source}`;
      log(`← output_audio.delta  text="${text}" audio=${audioSamples}samples eot=${msg.end_of_turn} kv=${msg.kv_cache_length}${extra}`);
      if (msg.end_of_turn) transcript.textContent += '\n';
      break;
    }
    case 'response.listen': {
      setStatus('listening', 'Listening');
      kvDisplay.textContent = msg.kv_cache_length || '0';
      stopPlayback();
      let extra = '';
      if (msg.cost_all_ms != null) extra += ` cost_all=${msg.cost_all_ms}ms`;
      if (msg.wall_clock_ms != null) extra += ` wall=${msg.wall_clock_ms}ms`;
      log(`← response.listen  kv=${msg.kv_cache_length}${extra}`);
      break;
    }
    case 'session.closed':
      log(`← session.closed  reason="${msg.reason}"`);
      setStatus('idle', `Closed (${msg.reason})`);
      cleanup();
      break;
    case 'error': {
      const err = msg.error || {};
      log(`← error  type="${err.type}" code="${err.code}" message="${err.message}"`);
      break;
    }
    default:
      log(`← ${type}  ${JSON.stringify(msg)}`);
  }
}

function byteSize(b64) {
  if (!b64) return 0;
  return Math.floor(b64.length * 3 / 4);
}

function sendSessionUpdate() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const session = { instructions: '你是一个友好的中文助手。请用简短的语句回答。' };
  if (currentMode === 'video') session.max_slice_nums = 1;
  const payload = { type: 'session.update', session };
  ws.send(JSON.stringify(payload));
  log(`→ session.update  instructions="${session.instructions}" max_slice_nums=${session.max_slice_nums||'N/A'}`);
}

function startSending() {
  sendInterval = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN || !sessionCreated) return;

    const audioB64 = collectAudioChunk();
    const msg = {
      type: 'input_audio_buffer.append',
      audio: audioB64,
    };

    let frameInfo = '';
    if (currentMode === 'video') {
      const frame = captureFrame();
      if (frame) {
        msg.video_frames = [frame];
        frameInfo = ` video=1frame(${byteSize(frame)}B)`;
      }
    }

    ws.send(JSON.stringify(msg));
    chunksSent++;
    chunkCountEl.textContent = chunksSent;
    log(`→ append #${chunksSent}  audio=${byteSize(audioB64)}B${frameInfo}`);
  }, CHUNK_SEC * 1000);
  log(`Streaming started: ${currentMode === 'video' ? 'audio + video' : 'audio only'}, 1 chunk/sec`);
}

function interrupt() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const audioB64 = collectAudioChunk();
  const msg = { type: 'input_audio_buffer.append', audio: audioB64, force_listen: true };
  let frameInfo = '';
  if (currentMode === 'video') {
    const frame = captureFrame();
    if (frame) { msg.video_frames = [frame]; frameInfo = ` video=1frame(${byteSize(frame)}B)`; }
  }
  ws.send(JSON.stringify(msg));
  log(`→ append (force_listen=true)  audio=${byteSize(audioB64)}B${frameInfo}`);
  stopPlayback();
}

function stop() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'session.close', reason: 'user_stop' }));
    log('→ session.close  reason="user_stop"');
  }
}

function cleanup() {
  sessionActive = false;
  sessionCreated = false;
  if (sendInterval) { clearInterval(sendInterval); sendInterval = null; }
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  preview.srcObject = null;
  audioBuffer = [];
  ws = null;
  btnStart.disabled = false;
  btnStop.disabled = true;
  btnInterrupt.disabled = true;
  modeSelect.disabled = false;
  if (!statusDot.className.includes('idle')) setStatus('idle', 'Disconnected');
}

btnStart.onclick = start;
btnStop.onclick = stop;
btnInterrupt.onclick = interrupt;
</script>
</body>
</html>
